<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GoatLink CRM">
<meta name="theme-color" content="#08080d">
<title>GoatLink — Gestionale</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080d;--bg2:#0f0f16;--card:#13131c;--card2:#181822;
  --border:#22222e;--accent:#b8f548;--accent-dim:rgba(184,245,72,0.12);
  --accent2:#48c8f5;--text:#eeeef5;--muted:#6b6b88;--muted2:#9999b8;
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --todo:#6b6b88;--progress:#48c8f5;--waiting:#f5a548;--paid:#b8f548;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:calc(80px + var(--safe-bottom));overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:rgba(8,8,13,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--accent);letter-spacing:-.02em}
.logo span{color:var(--text)}
.logo-sub{font-size:.72rem;color:var(--muted);margin-top:1px}
.btn-add{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#08080d;border:none;font-size:1.5rem;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.install-banner{margin:12px 16px;background:var(--card2);border:1px solid rgba(72,200,245,.2);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--muted2)}
.install-banner strong{color:var(--accent2)}
.close-x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;line-height:1}
.toolbar{padding:10px 16px;display:flex;gap:8px;align-items:center}
.sw{flex:1;position:relative}
.sw input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:9px 12px 9px 34px;outline:none}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.vtog{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px}
.vb{padding:5px 10px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;background:transparent;color:var(--muted)}
.vb.on{background:var(--card2);color:var(--text)}
.fbtn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted2);font-size:.78rem;font-weight:500;padding:9px 12px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.fbtn.on{background:var(--accent-dim);border-color:rgba(184,245,72,.35);color:var(--accent)}
.fchips{display:none;padding:0 16px 10px;gap:6px;flex-wrap:wrap}
.fchips.open{display:flex}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.sn{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;line-height:1}
.sl{font-size:.62rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.sc.t .sn{color:var(--todo)}.sc.p .sn{color:var(--progress)}.sc.w .sn{color:var(--waiting)}.sc.d .sn{color:var(--paid)}
.earn-bar{margin:0 16px 12px;background:var(--accent-dim);border:1px solid rgba(184,245,72,.2);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.el{font-size:.75rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em}
.ea{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--accent)}
.es{font-size:.72rem;color:var(--muted);margin-top:1px}
.slabel{padding:4px 16px 8px;font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.clist{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;cursor:pointer}
.ci{flex:1;min-width:0}
.cn{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:.75rem;color:var(--muted);margin-top:2px}
.cdots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.todo{background:var(--todo)}.dot.progress{background:var(--progress)}.dot.waiting{background:var(--waiting)}.dot.paid{background:var(--paid)}
.ce{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--accent);flex-shrink:0}
.chev{color:var(--muted);font-size:.75rem;margin-left:8px;transition:transform .2s;flex-shrink:0}
.cc.open .chev{transform:rotate(180deg)}
.arows{display:none;flex-direction:column;gap:6px;border-top:1px solid var(--border);padding:10px 16px 12px}
.cc.open .arows{display:flex}
.arow{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:var(--radius-sm);padding:8px 12px}
.ai{font-size:1.1rem;flex-shrink:0}
.an{flex:1;font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aa{font-size:.75rem;color:var(--muted2);flex-shrink:0;margin-right:4px}
.ssel{background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;flex-shrink:0;padding:4px 8px;border-radius:6px;-webkit-appearance:none;text-align:center}
.ssel.todo{background:rgba(107,107,136,.15);color:var(--todo)}
.ssel.progress{background:rgba(72,200,245,.12);color:var(--progress)}
.ssel.waiting{background:rgba(245,165,72,.12);color:var(--waiting)}
.ssel.paid{background:rgba(184,245,72,.12);color:var(--paid)}
.anw{width:100%;margin-top:4px}
.anote{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:.75rem;padding:5px 8px;outline:none;resize:none;min-height:28px}
.anote::placeholder{color:var(--muted)}
.cact{display:none;gap:8px;border-top:1px solid var(--border);padding:10px 16px 12px}
.cc.open .cact{display:flex}
.bsm{flex:1;padding:8px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--muted2)}
.bsm.del{color:#ff6b6b;border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.06)}
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.ei{font-size:3rem;margin-bottom:12px}
.et{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--muted2);margin-bottom:6px}
.es2{font-size:.85rem;line-height:1.5}
.twrap{display:none;padding:0 16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:540px}
thead th{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg)}
thead th.ac{text-align:center;min-width:64px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--card)}
tbody td{padding:9px 10px;font-size:.83rem;vertical-align:middle}
.tdn{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;white-space:nowrap}
.tdp{font-size:.72rem;color:var(--muted)}
.tdc{font-family:'Syne',sans-serif;font-weight:700;color:var(--muted2);text-align:center}
.tde{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent);text-align:right;white-space:nowrap}
.tda{text-align:center}
.pill{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:99px;white-space:nowrap;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;text-align:center}
.pill.todo{background:rgba(107,107,136,.18);color:var(--todo)}
.pill.progress{background:rgba(72,200,245,.14);color:var(--progress)}
.pill.waiting{background:rgba(245,165,72,.14);color:var(--waiting)}
.pill.paid{background:rgba(184,245,72,.14);color:var(--paid)}
.pill.empty{background:var(--card2);color:var(--muted)}
.moverlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:540px;padding:20px 20px calc(20px + var(--safe-bottom));max-height:90vh;overflow-y:auto;animation:sup .25s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:18px}
.flabel{font-size:.75rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.finput{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;padding:11px 14px;outline:none;margin-bottom:14px}
.finput::placeholder{color:var(--muted)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.achk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.achk.on{background:var(--accent-dim);border-color:rgba(184,245,72,.35)}
.aci{font-size:1.1rem;flex-shrink:0}
.acn{font-size:.85rem;font-weight:500;flex:1}
.acb{font-size:.72rem;color:var(--accent);font-weight:600}
.bpri{width:100%;padding:13px;background:var(--accent);color:#08080d;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
.toast{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:.82rem;font-weight:500;padding:10px 18px;border-radius:99px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:400}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Goat<span>Link</span></div>
    <div class="logo-sub">Gestionale Clienti</div>
  </div>
  <button class="btn-add" onclick="openAdd()">+</button>
</div>

<div class="install-banner" id="ibanner">
  <span>📲</span>
  <span><strong>Offline su iPhone:</strong> Safari → Condividi → Aggiungi a schermata Home</span>
  <button class="close-x" onclick="dismissBanner()">✕</button>
</div>

<div class="toolbar">
  <div class="sw">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Cerca cliente..." oninput="render()">
  </div>
  <div class="vtog">
    <button class="vb on" id="vb-cards" onclick="setView('cards')">Cards</button>
    <button class="vb"    id="vb-table" onclick="setView('table')">Tabella</button>
  </div>
  <button class="fbtn" id="fbtn" onclick="toggleFilter()">Filtro</button>
</div>

<div class="fchips" id="fchips">
  <button class="fbtn on" data-f="all"      onclick="setFilter('all')">Tutti</button>
  <button class="fbtn"    data-f="todo"     onclick="setFilter('todo')">Da fare</button>
  <button class="fbtn"    data-f="progress" onclick="setFilter('progress')">In corso</button>
  <button class="fbtn"    data-f="waiting"  onclick="setFilter('waiting')">Attesa</button>
  <button class="fbtn"    data-f="paid"     onclick="setFilter('paid')">Pagate</button>
</div>

<div class="stats" id="stats"></div>

<div class="earn-bar">
  <div>
    <div class="el">Commissioni maturate</div>
    <div class="ea" id="tot-e">0€</div>
    <div class="es" id="tot-p">0€ in attesa</div>
  </div>
  <div style="font-size:2rem">💰</div>
</div>

<div class="slabel" id="slabel">Clienti</div>
<div class="clist"  id="cards-view"></div>
<div class="twrap"  id="table-view">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<!-- MODAL -->

<div class="moverlay" id="moverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="mtitle">Nuovo Cliente</div>
    <div class="flabel">Nome *</div>
    <input class="finput" id="f-name"  type="text" placeholder="Es. Marco Rossi">
    <div class="flabel">Telefono</div>
    <input class="finput" id="f-phone" type="tel"  placeholder="Es. 333 1234567">
    <div class="flabel">App da attivare</div>
    <div class="agrid" id="agrid"></div>
    <button class="bpri" id="sbtn" onclick="saveClient()">Salva Cliente</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS = [
  { id:'bbva',      name:'BBVA',      icon:'🏦', bonus:10,  label:'10€'     },
  { id:'coinbase',  name:'Coinbase',  icon:'🪙', bonus:20,  label:'20€'     },
  { id:'buddybank', name:'Buddybank', icon:'💙', bonus:50,  label:'50€'     },
  { id:'bybit',     name:'Bybit',     icon:'📈', bonus:45,  label:'45€'     },
  { id:'isybank',   name:'Isybank',   icon:'🟢', bonus:30,  label:'30€'     },
  { id:'tinaba',    name:'Tinaba',    icon:'💜', bonus:10,  label:'10€'     },
  { id:'bitstack',  name:'Bitstack',  icon:'₿',  bonus:10,  label:'10€ BTC' },
];
const SL = { todo:'Da fare', progress:'In corso', waiting:'Attesa', paid:'Pagata' };

let clients = [], editId = null, fval = 'all', view = 'cards', openSet = new Set();

function save() { localStorage.setItem('gl3_clients', JSON.stringify(clients)); }
function load() {
  try { var r = localStorage.getItem('gl3_clients'); if (r) clients = JSON.parse(r); }
  catch(e) { clients = []; }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}
function earned(c) {
  return c.apps.filter(function(a){ return a.status==='paid'; })
    .reduce(function(s,a){ return s + (APPS.find(function(x){ return x.id===a.id; })||{bonus:0}).bonus; }, 0);
}
function pend(c) {
  return c.apps.filter(function(a){ return a.status==='waiting'; })
    .reduce(function(s,a){ return s + (APPS.find(function(x){ return x.id===a.id; })||{bonus:0}).bonus; }, 0);
}

function toggleFilter() {
  var el = document.getElementById('fchips');
  el.classList.toggle('open');
  document.getElementById('fbtn').classList.toggle('on', el.classList.contains('open'));
}
function setFilter(f) {
  fval = f;
  document.querySelectorAll('[data-f]').forEach(function(b){ b.classList.toggle('on', b.dataset.f===f); });
  render();
}
function setView(v) {
  view = v;
  document.getElementById('vb-cards').classList.toggle('on', v==='cards');
  document.getElementById('vb-table').classList.toggle('on', v==='table');
  document.getElementById('cards-view').style.display = v==='cards' ? 'flex' : 'none';
  document.getElementById('table-view').style.display = v==='table' ? 'block' : 'none';
  document.getElementById('slabel').style.display = v==='cards' ? '' : 'none';
  render();
}

function renderStats() {
  var c = {todo:0,progress:0,waiting:0,paid:0};
  clients.forEach(function(cl){ cl.apps.forEach(function(a){ if(c[a.status]!==undefined) c[a.status]++; }); });
  document.getElementById('stats').innerHTML =
    '<div class="sc t"><div class="sn">'+c.todo+'</div><div class="sl">Da fare</div></div>' +
    '<div class="sc p"><div class="sn">'+c.progress+'</div><div class="sl">In corso</div></div>' +
    '<div class="sc w"><div class="sn">'+c.waiting+'</div><div class="sl">Attesa</div></div>' +
    '<div class="sc d"><div class="sn">'+c.paid+'</div><div class="sl">Pagate</div></div>';
  var tot = clients.reduce(function(s,cl){ return s+earned(cl); }, 0);
  var pe  = clients.reduce(function(s,cl){ return s+pend(cl); }, 0);
  document.getElementById('tot-e').textContent = tot + '€';
  document.getElementById('tot-p').textContent = pe + '€ in attesa';
}

function statusOpts(current) {
  return Object.keys(SL).map(function(k){
    return '<option value="'+k+'"'+(current===k?' selected':'')+'>'+SL[k]+'</option>';
  }).join('');
}

function renderCards(list) {
  var cv = document.getElementById('cards-view');
  if (list.length === 0) {
    cv.innerHTML = '<div class="empty"><div class="ei">🐐</div><div class="et">'
      +(clients.length===0?'Nessun cliente ancora':'Nessun risultato')+'</div><div class="es2">'
      +(clients.length===0?'Tocca + in alto per aggiungere il primo cliente.':'Prova a cambiare filtro o ricerca.')
      +'</div></div>';
    return;
  }
  cv.innerHTML = list.map(function(c) {
    var dots = c.apps.map(function(a){ return '<span class="dot '+a.status+'"></span>'; }).join('');
    var e = earned(c);
    var rows = c.apps.map(function(a) {
      var app = APPS.find(function(x){ return x.id===a.id; });
      if (!app) return '';
      return '<div class="arow">'
        +'<span class="ai">'+app.icon+'</span>'
        +'<span class="an">'+app.name+'</span>'
        +'<span class="aa">'+app.label+'</span>'
        +'<select class="ssel '+a.status+'" onchange="chStatus(\''+c.id+'\',\''+a.id+'\',this.value,this)" onclick="event.stopPropagation()">'
        +statusOpts(a.status)+'</select>'
        +'</div>'
        +'<div class="anw"><textarea class="anote" rows="1" placeholder="Note..." onchange="chNote(\''+c.id+'\',\''+a.id+'\',this.value)" onclick="event.stopPropagation()">'+esc(a.note)+'</textarea></div>';

```
}).join('');
var date = c.createdAt ? new Date(c.createdAt).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
var isOpen = openSet.has(c.id);
return '<div class="cc'+(isOpen?' open':'')+'" id="card-'+c.id+'">'
  +'<div class="ch" onclick="toggleCard(\''+c.id+'\')">'
  +'<div class="ci">'
  +'<div class="cn">'+esc(c.name)+'</div>'
  +'<div class="cm">'+(c.phone?'📱 '+esc(c.phone)+' • ':'')+c.apps.length+' app'+(date?' • '+date:'')+'</div>'
  +'<div class="cdots">'+dots+'</div>'
  +'</div>'
  +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
  +(e>0?'<span class="ce">'+e+'€</span>':'')
  +'<span class="chev">▼</span>'
  +'</div></div>'
  +'<div class="arows">'+rows+'</div>'
  +'<div class="cact">'
  +'<button class="bsm" onclick="openEdit(\''+c.id+'\');event.stopPropagation()">✏️ Modifica</button>'
  +'<button class="bsm del" onclick="delClient(\''+c.id+'\');event.stopPropagation()">🗑 Elimina</button>'
  +'</div></div>';

}).join(’’);
}

function renderTable(list) {
document.getElementById(‘thead’).innerHTML = ‘<tr><th>Cliente</th><th style="text-align:center">Pagate</th>’
+APPS.map(function(a){ return ‘<th class="ac">’+a.icon+’ ‘+a.name+’</th>’; }).join(’’)
+’<th style="text-align:right">Guadagnato</th></tr>’;
if (list.length === 0) {
document.getElementById(‘tbody’).innerHTML =
‘<tr><td colspan="'+(3+APPS.length)+'" style="text-align:center;padding:40px;color:var(--muted)">Nessun cliente</td></tr>’;
return;
}
document.getElementById(‘tbody’).innerHTML = list.map(function(c) {
var cells = APPS.map(function(app) {
var ca = c.apps.find(function(a){ return a.id===app.id; });
if (!ca) return ‘<td class="tda"><span class="pill empty">—</span></td>’;
return ‘<td class="tda"><select class="pill '+ca.status+'" onchange="chStatus(\''+c.id+'\',\''+app.id+'\',this.value,this)">’
+statusOpts(ca.status)+’</select></td>’;
}).join(’’);
var e = earned(c);
var done = c.apps.filter(function(a){ return a.status===‘paid’; }).length;
return ‘<tr>’
+’<td><div class="tdn">’+esc(c.name)+’</div>’+(c.phone?’<div class="tdp">’+esc(c.phone)+’</div>’:’’)+’</td>’
+’<td class="tdc">’+done+’/’+c.apps.length+’</td>’
+cells
+’<td class="tde">’+(e>0?e+‘€’:’—’)+’</td>’
+’</tr>’;
}).join(’’);
}

function render() {
renderStats();
var q = document.getElementById(‘search’).value.toLowerCase();
var list = clients.filter(function(c) {
var mq = !q || c.name.toLowerCase().includes(q) || (c.phone||’’).includes(q);
if (!mq) return false;
if (fval===‘all’) return true;
return c.apps.some(function(a){ return a.status===fval; });
});
document.getElementById(‘slabel’).textContent = list.length+’ cliente’+(list.length!==1?‘i’:’’);
if (view===‘table’) { renderTable(list); return; }
renderCards(list);
}

function toggleCard(id) {
if (openSet.has(id)) openSet.delete(id); else openSet.add(id);
var card = document.getElementById(‘card-’+id);
if (card) card.classList.toggle(‘open’, openSet.has(id));
}

function chStatus(cid, aid, ns, el) {
var c = clients.find(function(x){ return x.id===cid; });
if (!c) return;
var a = c.apps.find(function(x){ return x.id===aid; });
if (!a) return;
a.status = ns;
el.className = (view===‘table’ ? ‘pill ’ : ‘ssel ‘) + ns;
save(); renderStats();
var card = document.getElementById(‘card-’+cid);
if (card) {
var dots = card.querySelector(’.cdots’);
if (dots) dots.innerHTML = c.apps.map(function(ap){ return ‘<span class="dot '+ap.status+'"></span>’; }).join(’’);
var ce = card.querySelector(’.ce’);
if (ce) ce.textContent = earned(c)+‘€’;
}
if (ns===‘paid’) toast(‘💰 Commissione registrata!’);
}

function chNote(cid, aid, note) {
var c = clients.find(function(x){ return x.id===cid; });
if (!c) return;
var a = c.apps.find(function(x){ return x.id===aid; });
if (!a) return;
a.note = note; save();
}

function buildGrid(sel) {
document.getElementById(‘agrid’).innerHTML = APPS.map(function(app) {
return ‘<div class="achk'+(sel.indexOf(app.id)>=0?' on':'')+'" id="chk-'+app.id+'" onclick="toggleApp(\''+app.id+'\')">’
+’<span class="aci">’+app.icon+’</span>’
+’<div style="flex:1;min-width:0"><div class="acn">’+app.name+’</div><div class="acb">’+app.label+’</div></div>’
+’</div>’;
}).join(’’);
}
function toggleApp(id) { document.getElementById(‘chk-’+id).classList.toggle(‘on’); }

function openAdd() {
editId = null;
document.getElementById(‘mtitle’).textContent = ‘Nuovo Cliente’;
document.getElementById(‘sbtn’).textContent   = ‘Salva Cliente’;
document.getElementById(‘f-name’).value  = ‘’;
document.getElementById(‘f-phone’).value = ‘’;
buildGrid([]);
document.getElementById(‘moverlay’).classList.add(‘open’);
setTimeout(function(){ document.getElementById(‘f-name’).focus(); }, 300);
}
function openEdit(id) {
var c = clients.find(function(x){ return x.id===id; });
if (!c) return;
editId = id;
document.getElementById(‘mtitle’).textContent = ‘Modifica Cliente’;
document.getElementById(‘sbtn’).textContent   = ‘Salva Modifiche’;
document.getElementById(‘f-name’).value  = c.name;
document.getElementById(‘f-phone’).value = c.phone||’’;
buildGrid(c.apps.map(function(a){ return a.id; }));
document.getElementById(‘moverlay’).classList.add(‘open’);
}
function overlayClick(e) {
if (e.target === document.getElementById(‘moverlay’)) {
document.getElementById(‘moverlay’).classList.remove(‘open’);
}
}
function saveClient() {
var name = document.getElementById(‘f-name’).value.trim();
if (!name) { toast(‘⚠️ Inserisci il nome’); return; }
var phone = document.getElementById(‘f-phone’).value.trim();
var sel = APPS.filter(function(app){
var el = document.getElementById(‘chk-’+app.id);
return el && el.classList.contains(‘on’);
}).map(function(app){ return app.id; });

if (editId) {
var c = clients.find(function(x){ return x.id===editId; });
if (!c) return;
c.name = name; c.phone = phone;
sel.forEach(function(id) {
if (!c.apps.find(function(a){ return a.id===id; })) {
c.apps.push({ id: id, status: ‘todo’, note: ‘’ });
}
});
c.apps = c.apps.filter(function(a){ return sel.indexOf(a.id)>=0; });
toast(‘✅ Cliente aggiornato’);
} else {
clients.unshift({
id: uid(), name: name, phone: phone, createdAt: Date.now(),
apps: sel.map(function(id){ return { id: id, status: ‘todo’, note: ‘’ }; })
});
toast(‘✅ Cliente aggiunto’);
}
save();
document.getElementById(‘moverlay’).classList.remove(‘open’);
render();
}
function delClient(id) {
if (!confirm(‘Eliminare questo cliente?’)) return;
clients = clients.filter(function(c){ return c.id!==id; });
openSet.delete(id); save(); render();
toast(‘🗑 Cliente eliminato’);
}
function dismissBanner() {
document.getElementById(‘ibanner’).style.display = ‘none’;
localStorage.setItem(‘gl_banner’,‘1’);
}

load();
if (localStorage.getItem(‘gl_banner’)) document.getElementById(‘ibanner’).style.display = ‘none’;
render();
document.addEventListener(‘keydown’, function(e) {
if (e.key===‘Enter’ && document.getElementById(‘moverlay’).classList.contains(‘open’)) saveClient();
});
</script>

</body>
</html>
