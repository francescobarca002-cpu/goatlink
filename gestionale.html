<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080d">
<title>GoatLink — Gestionale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080d;--bg2:#0f0f16;--card:#13131c;--card2:#181822;
  --border:#22222e;--accent:#b8f548;--text:#eeeef5;
  --muted:#6b6b88;--muted2:#9999b8;
  --todo:#6b6b88;--prog:#48c8f5;--wait:#f5a548;--paid:#b8f548;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:15px;min-height:100vh;padding-bottom:calc(60px + var(--safe-bottom))}
header{background:#0f0f16;border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-weight:800;font-size:1.15rem;color:var(--accent)}
.logo span{color:var(--text)}
.logo-sub{font-size:.7rem;color:var(--muted);margin-top:2px}
#btn-add{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:1.6rem;line-height:44px;text-align:center;cursor:pointer;flex-shrink:0;-webkit-appearance:none;display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.sn{font-weight:700;font-size:1.1rem}
.sl{font-size:.6rem;color:var(--muted);margin-top:2px;text-transform:uppercase}
.sc.t .sn{color:var(--todo)}.sc.p .sn{color:var(--prog)}.sc.w .sn{color:var(--wait)}.sc.d .sn{color:var(--paid)}
.earn{margin:0 16px 12px;background:rgba(184,245,72,.1);border:1px solid rgba(184,245,72,.2);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.el{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em}
.ea{font-weight:800;font-size:1.5rem;color:var(--accent)}
.ep{font-size:.7rem;color:var(--muted)}
.toolbar{padding:0 16px 10px;display:flex;gap:8px}
.sw{flex:1;position:relative}
.sw input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;padding:9px 12px 9px 34px;outline:none;font-family:inherit}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:14px}
.vtog{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
.vb{padding:5px 10px;border-radius:7px;border:none;font-size:.75rem;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit}
.vb.on{background:var(--card2);color:var(--text)}
.clist{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 10px;cursor:pointer}
.cn{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:.72rem;color:var(--muted);margin-top:2px}
.cdots{display:flex;gap:5px;margin-top:5px}
.dot{width:8px;height:8px;border-radius:50%}
.dot.todo{background:var(--todo)}.dot.progress{background:var(--prog)}.dot.waiting{background:var(--wait)}.dot.paid{background:var(--paid)}
.ce{font-weight:700;color:var(--accent);font-size:1rem;flex-shrink:0}
.chev{color:var(--muted);font-size:.7rem;margin-left:8px;transition:transform .2s;flex-shrink:0}
.cc.open .chev{transform:rotate(180deg)}
.arows{display:none;flex-direction:column;gap:6px;border-top:1px solid var(--border);padding:10px 16px 12px}
.cc.open .arows{display:flex}
.arow{display:flex;align-items:center;gap:9px;background:var(--card2);border-radius:10px;padding:8px 11px}
.an{flex:1;font-size:.85rem;font-weight:500}
.aa{font-size:.72rem;color:var(--muted2);flex-shrink:0;margin-right:3px}
.ssel{-webkit-appearance:none;appearance:none;border:none;outline:none;font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;flex-shrink:0;padding:4px 8px;border-radius:6px;text-align:center}
.ssel.todo{background:rgba(107,107,136,.18);color:var(--todo)}
.ssel.progress{background:rgba(72,200,245,.14);color:var(--prog)}
.ssel.waiting{background:rgba(245,165,72,.14);color:var(--wait)}
.ssel.paid{background:rgba(184,245,72,.14);color:var(--paid)}
.anw{width:100%;margin-top:4px}
.anote{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted2);font-family:inherit;font-size:.73rem;padding:5px 8px;outline:none;resize:none;min-height:26px}
.anote::placeholder{color:var(--muted)}
.cact{display:none;gap:8px;border-top:1px solid var(--border);padding:10px 16px 12px}
.cc.open .cact{display:flex}
.bsm{flex:1;padding:9px;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--muted2)}
.bsm.del{color:#ff6b6b;border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.07)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-i{font-size:2.8rem;margin-bottom:10px}
.empty-t{font-weight:700;font-size:1rem;color:var(--muted2);margin-bottom:5px}
.empty-s{font-size:.82rem;line-height:1.5}
.twrap{display:none;padding:0 16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
thead th{font-size:.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;padding:8px 9px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg)}
thead th.ac{text-align:center;min-width:60px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:9px;font-size:.82rem;vertical-align:middle}
.tdn{font-weight:700;font-size:.88rem;white-space:nowrap}
.tdp{font-size:.7rem;color:var(--muted)}
.tdc{font-weight:700;color:var(--muted2);text-align:center}
.tde{font-weight:700;color:var(--accent);text-align:right;white-space:nowrap}
.tda{text-align:center}
.pill{-webkit-appearance:none;appearance:none;display:inline-block;font-size:.6rem;font-weight:700;padding:3px 6px;border-radius:99px;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;text-align:center}
.pill.todo{background:rgba(107,107,136,.18);color:var(--todo)}
.pill.progress{background:rgba(72,200,245,.14);color:var(--prog)}
.pill.waiting{background:rgba(245,165,72,.14);color:var(--wait)}
.pill.paid{background:rgba(184,245,72,.14);color:var(--paid)}
.pill.empty{background:var(--card2);color:var(--muted)}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;visibility:hidden;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{visibility:visible;opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:22px 22px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:540px;padding:18px 18px calc(18px + var(--safe-bottom));max-height:88vh;overflow-y:auto;animation:sup .22s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.mtitle{font-weight:700;font-size:1.05rem;margin-bottom:16px}
.flabel{font-size:.72rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.finput{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.95rem;padding:11px 13px;outline:none;margin-bottom:13px;-webkit-appearance:none}
.finput::placeholder{color:var(--muted)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.achk{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 11px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.achk.on{background:rgba(184,245,72,.1);border-color:rgba(184,245,72,.35)}
.aci{font-size:1.1rem;flex-shrink:0}
.acn{font-size:.84rem;font-weight:500;flex:1}
.acb{font-size:.7rem;color:var(--accent);font-weight:600}
.bpri{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;-webkit-appearance:none}
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:.8rem;font-weight:500;padding:9px 16px;border-radius:99px;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.slabel{padding:4px 16px 8px;font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Goat<span>Link</span></div>
    <div class="logo-sub">Gestionale Clienti</div>
  </div>
  <button id="btn-add">+</button>
</header>

<div class="stats" id="stats"></div>

<div class="earn">
  <div>
    <div class="el">Commissioni maturate</div>
    <div class="ea" id="tot-e">0&euro;</div>
    <div class="ep" id="tot-p">0&euro; in attesa</div>
  </div>
  <div style="font-size:1.8rem">&#x1F4B0;</div>
</div>

<div class="toolbar">
  <div class="sw">
    <span class="si">&#x1F50D;</span>
    <input type="text" id="search" placeholder="Cerca cliente...">
  </div>
  <div class="vtog">
    <button class="vb on" id="vb-c">Cards</button>
    <button class="vb"    id="vb-t">Tabella</button>
  </div>
</div>

<div class="slabel" id="slabel">Clienti</div>
<div class="clist" id="cards-view"></div>
<div class="twrap" id="table-view">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-box">
    <div class="mhandle"></div>
    <div class="mtitle" id="mtitle">Nuovo Cliente</div>
    <div class="flabel">Nome *</div>
    <input class="finput" id="f-name" type="text" placeholder="Es. Marco Rossi">
    <div class="flabel">Telefono</div>
    <input class="finput" id="f-phone" type="tel" placeholder="Es. 333 1234567">
    <div class="flabel">App da attivare</div>
    <div class="agrid" id="agrid"></div>
    <button class="bpri" id="sbtn">Salva Cliente</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var APPS=[
  {id:'bbva',name:'BBVA',icon:'&#x1F3E6;',bonus:10,label:'10&euro;'},
  {id:'coinbase',name:'Coinbase',icon:'&#x1FA99;',bonus:20,label:'20&euro;'},
  {id:'buddybank',name:'Buddybank',icon:'&#x1F499;',bonus:50,label:'50&euro;'},
  {id:'bybit',name:'Bybit',icon:'&#x1F4C8;',bonus:45,label:'45&euro;'},
  {id:'isybank',name:'Isybank',icon:'&#x1F7E2;',bonus:30,label:'30&euro;'},
  {id:'tinaba',name:'Tinaba',icon:'&#x1F49C;',bonus:10,label:'10&euro;'},
  {id:'bitstack',name:'Bitstack',icon:'&#x20BF;',bonus:10,label:'10&euro; BTC'}
];
var SL={todo:'Da fare',progress:'In corso',waiting:'Attesa',paid:'Pagata'};
var clients=[],editId=null,view='cards',openSet={};

function save(){try{localStorage.setItem('gl_v4',JSON.stringify(clients));}catch(e){}}
function load(){try{var r=localStorage.getItem('gl_v4');if(r)clients=JSON.parse(r);}catch(e){clients=[];}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function getApp(id){for(var i=0;i<APPS.length;i++){if(APPS[i].id===id)return APPS[i];}return null;}
function getClient(id){for(var i=0;i<clients.length;i++){if(clients[i].id===id)return clients[i];}return null;}
function getEarned(c){var s=0;for(var i=0;i<c.apps.length;i++){if(c.apps[i].status==='paid'){var a=getApp(c.apps[i].id);if(a)s+=a.bonus;}}return s;}
function getPend(c){var s=0;for(var i=0;i<c.apps.length;i++){if(c.apps[i].status==='waiting'){var a=getApp(c.apps[i].id);if(a)s+=a.bonus;}}return s;}

function renderStats(){
  var c={todo:0,progress:0,waiting:0,paid:0};
  for(var i=0;i<clients.length;i++)for(var j=0;j<clients[i].apps.length;j++){var s=clients[i].apps[j].status;if(c[s]!==undefined)c[s]++;}
  document.getElementById('stats').innerHTML=
    '<div class="sc t"><div class="sn">'+c.todo+'</div><div class="sl">Da fare</div></div>'+
    '<div class="sc p"><div class="sn">'+c.progress+'</div><div class="sl">In corso</div></div>'+
    '<div class="sc w"><div class="sn">'+c.waiting+'</div><div class="sl">Attesa</div></div>'+
    '<div class="sc d"><div class="sn">'+c.paid+'</div><div class="sl">Pagate</div></div>';
  var tot=0,pe=0;
  for(var i=0;i<clients.length;i++){tot+=getEarned(clients[i]);pe+=getPend(clients[i]);}
  document.getElementById('tot-e').textContent=tot+'€';
  document.getElementById('tot-p').textContent=pe+'€ in attesa';
}

function statusOpts(cur){
  var h='',keys=['todo','progress','waiting','paid'];
  for(var i=0;i<keys.length;i++)h+='<option value="'+keys[i]+'"'+(cur===keys[i]?' selected':'')+'>'+SL[keys[i]]+'</option>';
  return h;
}

function render(){
  renderStats();
  var q=document.getElementById('search').value.toLowerCase();
  var list=[];
  for(var i=0;i<clients.length;i++){var c=clients[i];if(!q||c.name.toLowerCase().indexOf(q)>=0||(c.phone||'').indexOf(q)>=0)list.push(c);}
  document.getElementById('slabel').textContent=list.length+' cliente'+(list.length!==1?'i':'');
  if(view==='table'){renderTable(list);}else{renderCards(list);}
}

function renderCards(list){
  var cv=document.getElementById('cards-view');
  if(!list.length){
    cv.innerHTML='<div class="empty"><div class="empty-i">&#x1F410;</div><div class="empty-t">'+(clients.length?'Nessun risultato':'Nessun cliente ancora')+'</div><div class="empty-s">'+(clients.length?'Prova a cambiare la ricerca.':'Premi + per aggiungere il primo cliente.')+'</div></div>';
    return;
  }
  var html='';
  for(var i=0;i<list.length;i++){
    var c=list[i];
    var dots='';for(var j=0;j<c.apps.length;j++)dots+='<span class="dot '+c.apps[j].status+'"></span>';
    var e=getEarned(c);
    var rows='';
    for(var j=0;j<c.apps.length;j++){
      var a=c.apps[j],app=getApp(a.id);if(!app)continue;
      rows+='<div class="arow">'
        +'<span class="aci">'+app.icon+'</span>'
        +'<span class="an">'+app.name+'</span>'
        +'<span class="aa">'+app.label+'</span>'
        +'<select class="ssel '+a.status+'" data-cid="'+c.id+'" data-aid="'+a.id+'" onchange="chStatus(this)">'
        +statusOpts(a.status)+'</select>'
        +'</div>'
        +'<div class="anw"><textarea class="anote" rows="1" placeholder="Note..." data-cid="'+c.id+'" data-aid="'+a.id+'" onchange="chNote(this)">'+esc(a.note)+'</textarea></div>';

```
}
var date=c.createdAt?new Date(c.createdAt).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
var isOpen=openSet[c.id];
html+='<div class="cc'+(isOpen?' open':'')+'" id="card-'+c.id+'">'
  +'<div class="ch" data-cid="'+c.id+'" onclick="toggleCard(this)">'
  +'<div style="flex:1;min-width:0"><div class="cn">'+esc(c.name)+'</div>'
  +'<div class="cm">'+(c.phone?'📱 '+esc(c.phone)+' · ':'')+c.apps.length+' app'+(date?' · '+date:'')+'</div>'
  +'<div class="cdots">'+dots+'</div></div>'
  +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+(e>0?'<span class="ce">'+e+'€</span>':'')+'<span class="chev">▼</span></div>'
  +'</div>'
  +'<div class="arows">'+rows+'</div>'
  +'<div class="cact">'
  +'<button class="bsm" data-cid="'+c.id+'" onclick="openEdit(this)">✏️ Modifica</button>'
  +'<button class="bsm del" data-cid="'+c.id+'" onclick="delClient(this)">🗑 Elimina</button>'
  +'</div></div>';
```

}
cv.innerHTML=html;
}

function renderTable(list){
var th=’<tr><th>Cliente</th><th style="text-align:center">Pagate</th>’;
for(var i=0;i<APPS.length;i++)th+=’<th class="ac">’+APPS[i].icon+’ ‘+APPS[i].name+’</th>’;
th+=’<th style="text-align:right">Guadagnato</th></tr>’;
document.getElementById(‘thead’).innerHTML=th;
if(!list.length){document.getElementById(‘tbody’).innerHTML=’<tr><td colspan="'+(3+APPS.length)+'" style="text-align:center;padding:40px;color:var(--muted)">Nessun cliente</td></tr>’;return;}
var tb=’’;
for(var i=0;i<list.length;i++){
var c=list[i],cells=’’;
for(var j=0;j<APPS.length;j++){
var app=APPS[j],ca=null;
for(var k=0;k<c.apps.length;k++){if(c.apps[k].id===app.id){ca=c.apps[k];break;}}
if(!ca){cells+=’<td class="tda"><span class="pill empty">—</span></td>’;continue;}
cells+=’<td class="tda"><select class="pill '+ca.status+'" data-cid="'+c.id+'" data-aid="'+app.id+'" onchange="chStatus(this)">’+statusOpts(ca.status)+’</select></td>’;
}
var e=getEarned(c),done=0;for(var j=0;j<c.apps.length;j++){if(c.apps[j].status===‘paid’)done++;}
tb+=’<tr><td><div class="tdn">’+esc(c.name)+’</div>’+(c.phone?’<div class="tdp">’+esc(c.phone)+’</div>’:’’)+’</td><td class="tdc">’+done+’/’+c.apps.length+’</td>’+cells+’<td class="tde">’+(e>0?e+‘€’:’—’)+’</td></tr>’;
}
document.getElementById(‘tbody’).innerHTML=tb;
}

function toggleCard(el){
var id=el.getAttribute(‘data-cid’);
var card=document.getElementById(‘card-’+id);if(!card)return;
if(openSet[id]){delete openSet[id];}else{openSet[id]=true;}
card.classList.toggle(‘open’,!!openSet[id]);
}

function chStatus(sel){
var cid=sel.getAttribute(‘data-cid’),aid=sel.getAttribute(‘data-aid’),ns=sel.value;
var c=getClient(cid);if(!c)return;
for(var i=0;i<c.apps.length;i++){if(c.apps[i].id===aid){c.apps[i].status=ns;break;}}
sel.className=(view===‘table’?‘pill ‘:‘ssel ‘)+ns;
save();renderStats();
var card=document.getElementById(‘card-’+cid);
if(card){var dots=card.querySelector(’.cdots’);if(dots){var d=’’;for(var i=0;i<c.apps.length;i++)d+=’<span class="dot '+c.apps[i].status+'"></span>’;dots.innerHTML=d;}}
if(ns===‘paid’)showToast(‘💰 Commissione registrata!’);
}

function chNote(ta){
var cid=ta.getAttribute(‘data-cid’),aid=ta.getAttribute(‘data-aid’);
var c=getClient(cid);if(!c)return;
for(var i=0;i<c.apps.length;i++){if(c.apps[i].id===aid){c.apps[i].note=ta.value;break;}}
save();
}

function buildGrid(sel){
var h=’’;
for(var i=0;i<APPS.length;i++){
var app=APPS[i],on=sel.indexOf(app.id)>=0;
h+=’<div class="achk'+(on?' on':'')+'" id="chk-'+app.id+'" onclick="toggleApp(\''+app.id+'\')">’
+’<span class="aci">’+app.icon+’</span>’
+’<div style="flex:1;min-width:0"><div class="acn">’+app.name+’</div><div class="acb">’+app.label+’</div></div>’
+’</div>’;
}
document.getElementById(‘agrid’).innerHTML=h;
}

function toggleApp(id){var el=document.getElementById(‘chk-’+id);if(el)el.classList.toggle(‘on’);}

function openAdd(){
editId=null;
document.getElementById(‘mtitle’).textContent=‘Nuovo Cliente’;
document.getElementById(‘sbtn’).textContent=‘Salva Cliente’;
document.getElementById(‘f-name’).value=’’;
document.getElementById(‘f-phone’).value=’’;
buildGrid([]);
document.getElementById(‘overlay’).classList.add(‘open’);
setTimeout(function(){document.getElementById(‘f-name’).focus();},300);
}

function openEdit(btn){
var id=btn.getAttribute(‘data-cid’),c=getClient(id);if(!c)return;
editId=id;
document.getElementById(‘mtitle’).textContent=‘Modifica Cliente’;
document.getElementById(‘sbtn’).textContent=‘Salva Modifiche’;
document.getElementById(‘f-name’).value=c.name;
document.getElementById(‘f-phone’).value=c.phone||’’;
var sel=[];for(var i=0;i<c.apps.length;i++)sel.push(c.apps[i].id);
buildGrid(sel);
document.getElementById(‘overlay’).classList.add(‘open’);
}

function closeOverlay(){document.getElementById(‘overlay’).classList.remove(‘open’);}

function saveClient(){
var name=document.getElementById(‘f-name’).value.trim();
if(!name){showToast(‘⚠️ Inserisci il nome’);return;}
var phone=document.getElementById(‘f-phone’).value.trim();
var sel=[];
for(var i=0;i<APPS.length;i++){var el=document.getElementById(‘chk-’+APPS[i].id);if(el&&el.classList.contains(‘on’))sel.push(APPS[i].id);}
if(editId){
var c=getClient(editId);if(!c)return;
c.name=name;c.phone=phone;
for(var i=0;i<sel.length;i++){var found=false;for(var j=0;j<c.apps.length;j++){if(c.apps[j].id===sel[i]){found=true;break;}}if(!found)c.apps.push({id:sel[i],status:‘todo’,note:’’});}
var na=[];for(var i=0;i<c.apps.length;i++){if(sel.indexOf(c.apps[i].id)>=0)na.push(c.apps[i]);}c.apps=na;
showToast(‘✅ Cliente aggiornato’);
}else{
var na=[];for(var i=0;i<sel.length;i++)na.push({id:sel[i],status:‘todo’,note:’’});
clients.unshift({id:uid(),name:name,phone:phone,createdAt:Date.now(),apps:na});
showToast(‘✅ Cliente aggiunto’);
}
save();closeOverlay();render();
}

function delClient(btn){
var id=btn.getAttribute(‘data-cid’);
if(!confirm(‘Eliminare questo cliente?’))return;
var nc=[];for(var i=0;i<clients.length;i++){if(clients[i].id!==id)nc.push(clients[i]);}
clients=nc;delete openSet[id];save();render();showToast(‘🗑 Cliente eliminato’);
}

// EVENTI - tutti con addEventListener, zero onclick sull’HTML critico
document.getElementById(‘btn-add’).addEventListener(‘click’,function(e){e.preventDefault();openAdd();});
document.getElementById(‘sbtn’).addEventListener(‘click’,function(e){e.preventDefault();saveClient();});
document.getElementById(‘search’).addEventListener(‘input’,function(){render();});
document.getElementById(‘vb-c’).addEventListener(‘click’,function(){
view=‘cards’;
document.getElementById(‘vb-c’).classList.add(‘on’);document.getElementById(‘vb-t’).classList.remove(‘on’);
document.getElementById(‘cards-view’).style.display=‘flex’;document.getElementById(‘table-view’).style.display=‘none’;
document.getElementById(‘slabel’).style.display=’’;render();
});
document.getElementById(‘vb-t’).addEventListener(‘click’,function(){
view=‘table’;
document.getElementById(‘vb-t’).classList.add(‘on’);document.getElementById(‘vb-c’).classList.remove(‘on’);
document.getElementById(‘cards-view’).style.display=‘none’;document.getElementById(‘table-view’).style.display=‘block’;
document.getElementById(‘slabel’).style.display=‘none’;render();
});
document.getElementById(‘overlay’).addEventListener(‘click’,function(e){if(e.target===this)closeOverlay();});

load();render();
</script>
